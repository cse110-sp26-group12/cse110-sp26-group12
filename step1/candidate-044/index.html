<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Token Generator | The Hype Machine</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body class="terminal-dark">
    <div class="mainframe">
        <header>
            <h1>AI TOKEN GENERATOR <span class="v-tag">v2.0-BETA</span></h1>
            <p class="subtitle">SYNTHESIZING ARTIFICIAL VALUE SINCE 2023</p>
        </header>

        <section class="display-panel">
            <div class="stat">
                <label>COMPUTE TOKENS:</label>
                <span id="token-count">1000</span>
            </div>
            <div class="stat">
                <label>MODEL STATE:</label>
                <span id="status-log">IDLE...</span>
            </div>
        </section>

        <section class="slot-machine">
            <div class="reel-container">
                <div class="reel" id="reel-1">🤖</div>
                <div class="reel" id="reel-2">🤖</div>
                <div class="reel" id="reel-3">🤖</div>
            </div>
            
            <button id="spin-btn">TRAIN MODEL (10 TOKENS)</button>
        </section>

        <footer class="terminal-log">
            <div id="log-content">> INITIALIZING HYPE ENGINE...</div>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
