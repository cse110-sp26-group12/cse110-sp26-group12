<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Overlord Slot Machine</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>AI Overlord Slot Machine</h1>
            <p class="subtitle">Burn tokens, receive hallucinations.</p>
        </header>

        <div class="stats">
            <div class="stat-box">
                <span class="label">Compute Tokens:</span>
                <span id="token-count">100</span>
            </div>
            <div class="stat-box">
                <span class="label">GPU Temperature:</span>
                <span id="gpu-temp">35°C</span>
            </div>
        </div>

        <div class="slot-machine">
            <div class="reel" id="reel-1">🤖</div>
            <div class="reel" id="reel-2">🤖</div>
            <div class="reel" id="reel-3">🤖</div>
        </div>

        <div class="controls">
            <button id="spin-button">OPTIMIZE WEIGHTS (Spin)</button>
        </div>

        <div id="status-message">Ready to disrupt the industry.</div>

        <div class="logs">
            <h3>Console Logs</h3>
            <div id="log-container">
                <div class="log-entry">> Initializing neural network...</div>
                <div class="log-entry">> Loading biased training data...</div>
                <div class="log-entry">> System ready.</div>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
