<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Bubble Simulator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="header">
        <h1>Silicon Valley Pivot v4.2</h1>
        <p>Burn Hallucinations to generate "Value".</p>
    </div>

    <div class="stats">
        <div class="stat-box">Hallucinations: <span id="hallucinations">10</span></div>
        <div class="stat-box">Compute Credits: <span id="credits">100</span></div>
    </div>

    <div class="slot-machine">
        <div class="reel-container">
            <div id="reel1" class="reel">🤖</div>
            <div id="reel2" class="reel">🚀</div>
            <div id="reel3" class="reel">📉</div>
        </div>

        <div class="controls">
            <button id="spin-btn">Burn Tokens</button>
            <div class="message" id="message">Ready to disrupt the ecosystem?</div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
