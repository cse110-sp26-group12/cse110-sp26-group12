<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inference Engine | Corporate AI Slot Machine</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <header>
            <h1>INFERENCE ENGINE v2.0</h1>
            <div class="metrics">
                <div class="metric">
                    <span class="label">GPU DEBT (TOKENS)</span>
                    <span id="token-balance" class="value">10000</span>
                </div>
                <div class="metric">
                    <span class="label">MODEL ACCURACY</span>
                    <span id="accuracy" class="value">99.9%</span>
                </div>
            </div>
        </header>

        <main>
            <div class="slot-machine">
                <div class="reel-container">
                    <div id="reel-1" class="reel">
                        <div class="symbol">🤖</div>
                    </div>
                    <div id="reel-2" class="reel">
                        <div class="symbol">⚡</div>
                    </div>
                    <div id="reel-3" class="reel">
                        <div class="symbol">💾</div>
                    </div>
                </div>

                <div class="controls">
                    <div class="bet-control">
                        <label for="bet-input">INFERENCE COST (TOKENS):</label>
                        <input type="number" id="bet-input" value="100" min="10" step="10">
                    </div>
                    <button id="spin-button">RUN INFERENCE</button>
                </div>
            </div>

            <aside id="console-output">
                <div class="console-header">SYSTEM LOG</div>
                <div id="log-content" class="log-content">
                    <p class="log-entry">Initializing weights...</p>
                    <p class="log-entry">Waiting for prompt injection...</p>
                </div>
            </aside>
        </main>

        <footer>
            <p>PROFITABILITY OVER ETHICS | &copy; 2026 CORPORATE AI INC.</p>
        </footer>
    </div>
    <script src="script.js"></script>
</body>
</html>
