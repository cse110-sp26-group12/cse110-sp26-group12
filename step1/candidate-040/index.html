<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Hype Slot Machine</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="header">
        <h1>AGI VENTURE SIMULATOR</h1>
        <div class="stats-box">
            <span class="label">COMPUTE CREDITS</span>
            <span id="balance" class="balance-value">50</span>
        </div>
    </div>

    <div class="machine-frame">
        <div class="reels-wrapper">
            <div id="reel1" class="reel">🤖</div>
            <div id="reel2" class="reel">🚀</div>
            <div id="reel3" class="reel">📉</div>
        </div>
        <div class="scanline"></div>
    </div>

    <div class="actions">
        <button id="spin-btn">Burn 5 Credits for Inference</button>
    </div>

    <div id="status-msg" class="terminal-msg">Ready to disrupt the industry...</div>

    <script src="app.js"></script>
</body>
</html>
