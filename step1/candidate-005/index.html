<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Token Grinder: The Hallucinator 9000</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>AI TOKEN GRINDER</h1>
        <p class="subtitle">Verifying your intelligence... 0% complete.</p>

        <div class="slot-machine">
            <div class="reels">
                <div class="reel" id="reel1">
                    <div class="reel-strip" id="strip1">
                        <div class="symbol">🤖</div>
                    </div>
                </div>
                <div class="reel" id="reel2">
                    <div class="reel-strip" id="strip2">
                        <div class="symbol">🧠</div>
                    </div>
                </div>
                <div class="reel" id="reel3">
                    <div class="reel-strip" id="strip3">
                        <div class="symbol">🌫️</div>
                    </div>
                </div>
            </div>
            
            <div class="controls">
                <div class="stat">
                    <span class="label">GPU TOKENS:</span>
                    <span id="token-count" class="value">100</span>
                </div>
                <button id="spin-button">BURN 10 TOKENS</button>
            </div>
        </div>

        <div class="terminal">
            <div class="terminal-header">SYSTEM_LOG.txt</div>
            <div id="log-content" class="log-content">
                Initializing LLM... Done.
                Ready to hallucinate value.
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
