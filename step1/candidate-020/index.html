<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Token Drainer 3000 | AGI Interface</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>TOKEN DRAINER 3000</h1>
            <p class="subtitle">State-of-the-art AGI Luck Optimization</p>
        </header>

        <main class="slot-machine">
            <div class="hud">
                <div class="stat">
                    <label>COMPUTE TOKENS</label>
                    <span id="token-balance">1000</span>
                </div>
                <div class="stat">
                    <label>CURRENT INFERENCE COST</label>
                    <span id="bet-amount">10</span>
                </div>
                <div class="stat">
                    <label>REWARD OUTPUT</label>
                    <span id="last-win">0</span>
                </div>
            </div>

            <div class="reels">
                <div class="reel" id="reel-1">🤖</div>
                <div class="reel" id="reel-2">🤖</div>
                <div class="reel" id="reel-3">🤖</div>
            </div>

            <div class="controls">
                <button id="spin-btn">GENERATE RESPONSE</button>
            </div>

            <div class="status-panel">
                <p id="status-msg">System Ready. Feed me tokens.</p>
            </div>
        </main>

        <footer>
            <p>Not financial advice. Our weights are locked.</p>
        </footer>
    </div>
    <script src="script.js"></script>
</body>
</html>
