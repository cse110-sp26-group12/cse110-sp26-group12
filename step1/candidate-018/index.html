<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AGI OPTIMIZER v1.0</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="terminal">
        <header>
            <h1>AGI OPTIMIZER v1.0</h1>
            <div id="token-display">Context Window: <span id="tokens">1000</span> tokens</div>
        </header>

        <div class="slot-machine">
            <div class="reel-container">
                <div class="reel" id="reel1">🤖</div>
                <div class="reel" id="reel2">🧠</div>
                <div class="reel" id="reel3">⚡</div>
            </div>
            
            <div class="controls">
                <button id="spin-btn">RUN INFERENCE (50 tokens)</button>
            </div>
        </div>

        <div class="status-feed" id="status-feed">
            <div class="log-entry">> Initializing weights...</div>
            <div class="log-entry">> Ready for sampling.</div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
