<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Token Slot Machine - The GPU Burner</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header>
            <h1>LLM CASINO 🎰</h1>
            <p class="subtitle">Burning GPUs Since 2023</p>
        </header>

        <div class="slot-machine">
            <div class="reels-container">
                <div class="reel" id="reel1">
                    <div class="reel-inner">🤖</div>
                </div>
                <div class="reel" id="reel2">
                    <div class="reel-inner">🤖</div>
                </div>
                <div class="reel" id="reel3">
                    <div class="reel-inner">🤖</div>
                </div>
            </div>

            <div class="status-panel">
                <div class="message" id="ai-message">System ready. Insert tokens to begin inference.</div>
            </div>

            <div class="controls">
                <div class="stat-box">
                    <label>TOKENS</label>
                    <div id="balance">1000</div>
                </div>
                <div class="stat-box">
                    <label>BET</label>
                    <input type="number" id="bet-input" value="10" min="1" step="10">
                </div>
                <button id="spin-btn">SPIN (BURN TOKENS)</button>
            </div>
        </div>

        <footer>
            <p>Disclaimer: Your tokens are hallucinated. This app does not actually process LLMs.</p>
        </footer>
    </div>
    <script src="script.js"></script>
</body>
</html>
