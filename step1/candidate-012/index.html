<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI TOKEN GRINDER v0.1-alpha</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="crt-overlay"></div>
    <div class="terminal-container">
        <header>
            <h1>[ AI TOKEN GRINDER v0.1-alpha ]</h1>
            <p class="subtitle">PROMETHEUS-CLASS INFERENCE TERMINAL</p>
        </header>

        <main>
            <div class="reels-container">
                <div class="reel" id="reel-1">
                    <div class="reel-strip">
                        <div class="symbol">🧠</div>
                    </div>
                </div>
                <div class="reel" id="reel-2">
                    <div class="reel-strip">
                        <div class="symbol">💾</div>
                    </div>
                </div>
                <div class="reel" id="reel-3">
                    <div class="reel-strip">
                        <div class="symbol">⛓️</div>
                    </div>
                </div>
            </div>

            <div class="hud">
                <div class="token-display">
                    COMPUTE TOKENS: <span id="token-balance">500</span>
                </div>
                <div class="status-window">
                    <div class="status-header">SYSTEM_LOG:</div>
                    <div id="status-log" class="status-content">
                        READY FOR INFERENCE...
                    </div>
                </div>
            </div>

            <div class="controls">
                <button id="inference-btn" class="btn">[ RUN INFERENCE (10 TOKENS) ]</button>
            </div>
        </main>

        <footer>
            <p>&copy; 2026 DEEP-HALLUCINATION LABS. NO RIGHTS RESERVED.</p>
        </footer>
    </div>
    <script src="app.js"></script>
</body>
</html>
