<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Slot Machine: Token Burner</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="machine-container">
        <header>
            <h1>LLM SLOT MACHINE</h1>
            <p>Burn credits. Generate hype.</p>
        </header>

        <div class="stats">
            <div class="stat-box">
                <span class="label">Compute Tokens:</span>
                <span id="token-count">1000</span>
            </div>
        </div>

        <div class="slots">
            <div class="reel" id="reel1">🤖</div>
            <div class="reel" id="reel2">🤖</div>
            <div class="reel" id="reel3">🤖</div>
        </div>

        <div class="controls">
            <button id="spin-button">PROMPT (Cost: 50)</button>
        </div>

        <div class="status-msg" id="status-msg">Ready to overfit?</div>
    </div>
    <script src="script.js"></script>
</body>
</html>
