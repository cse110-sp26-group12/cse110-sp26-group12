<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Hallucination Engine v0.1.0-alpha</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body class="terminal-body">
    <div class="container">
        <header>
            <h1 class="glitch-text">AI HALLUCINATION ENGINE</h1>
            <p class="subtitle">v0.1.0-alpha | Status: <span id="status">UNSTABLE</span></p>
        </header>

        <main class="slot-machine">
            <div class="reels">
                <div class="reel" id="reel1">🤖</div>
                <div class="reel" id="reel2">🤖</div>
                <div class="reel" id="reel3">🤖</div>
            </div>
        </main>

        <section class="stats-bar">
            <div class="stat-item">
                <span class="label">COMPUTE CREDITS:</span>
                <span class="value" id="credits">100</span>
            </div>
            <div class="stat-item">
                <span class="label">LAST REWARD:</span>
                <span class="value" id="last-win">0</span>
            </div>
            <div class="stat-item">
                <span class="label">MODEL:</span>
                <span class="value">GPT-∞ (Experimental)</span>
            </div>
        </section>

        <section class="console-box">
            <div class="console-header">SYSTEM_LOG:</div>
            <div class="console-content" id="log">
                <div>[SYSTEM] Booting Inference Kernel...</div>
                <div>[SYSTEM] GPU Temperature: CRITICAL</div>
                <div>[SYSTEM] Ready for prompting.</div>
            </div>
        </section>

        <footer class="controls">
            <button id="spin-btn" class="terminal-btn">RUN INFERENCE (-10 CREDITS)</button>
            <button id="refill-btn" class="terminal-btn hidden">SECURE VC FUNDING (+100 CREDITS)</button>
        </footer>
    </div>
    <script src="script.js"></script>
</body>
</html>
