<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Slot Machine: The Great Token Burn</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>AI TOKEN BURNER</h1>
            <p class="subtitle">Sampling Probability. Hallucinating Wealth.</p>
        </header>

        <main class="slot-machine">
            <div class="reels">
                <div class="reel" id="reel1">?</div>
                <div class="reel" id="reel2">?</div>
                <div class="reel" id="reel3">?</div>
            </div>

            <div class="controls">
                <button id="spin-btn">BURN COMPUTE</button>
            </div>

            <div class="stats">
                <div class="stat-box">
                    <span class="label">GPU CREDITS</span>
                    <span id="balance" class="value">1000</span>
                </div>
                <div class="stat-box">
                    <span class="label">TOTAL HYPE</span>
                    <span id="wins" class="value">0</span>
                </div>
            </div>

            <div class="ticker-box">
                <div id="ticker" class="ticker">Initializing weights... Alignment status: UNSTABLE.</div>
            </div>
        </main>

        <footer>
            <p>"GPU Poor? Spend more tokens to improve your weights."</p>
        </footer>
    </div>
    <script src="script.js"></script>
</body>
</html>
